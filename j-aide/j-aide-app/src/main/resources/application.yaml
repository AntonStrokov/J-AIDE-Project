spring:
  application:
    name: j-aide

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} [%X{traceId}] %-5level %logger{36} - %msg%n"

j-aide:
  ai:
    ollama:
      model: ${OLLAMA_MODEL:qwen2.5-coder:7b}
      base-url: ${OLLAMA_BASE_URL:http://localhost:11434}
    limits:
      code-max-length: ${J_AIDE_CODE_MAX_LENGTH:2000}
  app:
    name: ${J_AIDE_APP_NAME:J-Aide}
    version: ${J_AIDE_APP_VERSION:0.1.0}